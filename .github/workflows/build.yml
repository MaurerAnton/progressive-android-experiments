name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;21.3.6528147 cmake;3.22.1 platforms;android-30 build-tools;30.0.3'
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew assembleFdroidRelease --no-daemon -PallWarningsAsErrors=false -PminifyEnabled
      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: vector-app/build/outputs/apk/fdroid/release/*.apk
