name: Build 0.0.3.5

on:
  push:
    branches: [0.0.3.5]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 0.0.3.5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;21.3.6528147 cmake;3.22.1 platforms;android-30 build-tools;30.0.3'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/21.3.6528147" >> local.properties

      - name: Build
        run: ./gradlew assembleFdroidRelease --no-daemon -PallWarningsAsErrors=false -PminifyEnabled

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks-0.0.3.5
          path: vector-app/build/outputs/apk/fdroid/release/*.apk
